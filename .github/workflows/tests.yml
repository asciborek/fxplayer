name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: maven

    - name: Run tests with Maven
      run: mvn clean test --batch-mode

    - name: Generate Surefire Report
      if: always()
      run: mvn site -DskipTests --batch-mode

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/site/
        retention-days: 30

